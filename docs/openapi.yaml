          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  '/api/v1/devices/{device_id}/status':
    get:
      tags:
        - Devices
      summary: Status atual do dispositivo
      operationId: get_device_status_api_v1_devices__device_id__status_get
      security:
