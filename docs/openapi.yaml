openapi: 3.1.0
info:
  title: Smart Building API
  description: Sistema de controle inteligente de ar-condicionado
  version: 1.0.0
paths:
  /api/v1/health:
    get:
      tags:
        - Health
      summary: Health check
      operationId: health_check_api_v1_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                title: Response Health Check Api V1 Health Get
  /api/v1/auth/login:
    post:
      tags:
        - Auth
      summary: Autenticar e obter tokens JWT
      operationId: login_api_v1_auth_login_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/refresh:
    post:
      tags:
        - Auth
      summary: Renovar access token
      operationId: refresh_api_v1_auth_refresh_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/logout:
    post:
      tags:
        - Auth
      summary: Revogar token (logout)
      operationId: logout_api_v1_auth_logout_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                title: Response Logout Api V1 Auth Logout Post
      security:
        - HTTPBearer: []
  /api/v1/sensors/data:
    post:
      tags:
        - Sensors
      summary: Ingerir leitura de sensor IoT
      operationId: ingest_sensor_data_api_v1_sensors_data_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SensorDataIngest'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SensorDataResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
        - HTTPBearer: []
  /api/v1/sensors:
    get:
      tags:
        - Sensors
      summary: Listar sensores registrados
      operationId: list_sensors_api_v1_sensors_get
      security:
        - HTTPBearer: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
            title: Page
        - name: size
          in: query
          required: false
          schema:
            type: integer
            maximum: 100
            minimum: 1
            default: 20
            title: Size
        - name: tipo
          in: query
          required: false
          schema:
            anyOf:
              - $ref: '#/components/schemas/SensorTipo'
              - type: 'null'
            title: Tipo
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SensorListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  '/api/v1/sensors/{sensor_id}':
    get:
      tags:
        - Sensors
      summary: Detalhes de um sensor
      operationId: get_sensor_api_v1_sensors__sensor_id__get
      security:
        - HTTPBearer: []
      parameters:
        - name: sensor_id
          in: path
          required: true
          schema:
            type: string
            title: Sensor Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SensorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  '/api/v1/sensors/{sensor_id}/data':
    get:
      tags:
        - Sensors
      summary: Histórico de leituras
      operationId: get_sensor_history_api_v1_sensors__sensor_id__data_get
      security:
        - HTTPBearer: []
      parameters:
        - name: sensor_id
          in: path
          required: true
          schema:
            type: string
            title: Sensor Id
        - name: period
          in: query
          required: false
          schema:
            type: string
            pattern: ^(1h|24h|7d|30d)$
            default: 24h
            title: Period
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
            title: Page
        - name: size
          in: query
          required: false
          schema:
            type: integer
            maximum: 100
            minimum: 1
            default: 20
            title: Size
        - name: anomalies_only
          in: query
          required: false
          schema:
            type: boolean
            default: false
            title: Anomalies Only
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                title: >-
                  Response Get Sensor History Api V1 Sensors  Sensor Id  Data
                  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  '/api/v1/sensors/{sensor_id}/latest':
    get:
      tags:
        - Sensors
      summary: Última leitura de um sensor
      operationId: get_sensor_latest_api_v1_sensors__sensor_id__latest_get
      security:
        - HTTPBearer: []
      parameters:
        - name: sensor_id
          in: path
          required: true
          schema:
            type: string
            title: Sensor Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SensorLatestResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/devices:
    get:
      tags:
        - Devices
      summary: Listar dispositivos
      operationId: list_devices_api_v1_devices_get
      security:
        - HTTPBearer: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
            title: Page
        - name: size
          in: query
          required: false
          schema:
            type: integer
            maximum: 100
            minimum: 1
            default: 20
            title: Size
        - name: room_id
          in: query
          required: false
          schema:
            anyOf:
              - type: string
                format: uuid
              - type: 'null'
            title: Room Id
        - name: status
          in: query
          required: false
          schema:
            anyOf:
              - $ref: '#/components/schemas/DeviceStatus'
              - type: 'null'
            title: Status
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                title: Response List Devices Api V1 Devices Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
        - Devices
      summary: Cadastrar dispositivo
      operationId: create_device_api_v1_devices_post
      security:
        - HTTPBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  '/api/v1/devices/{device_id}':
    get:
      tags:
        - Devices
      summary: Detalhes de um dispositivo
      operationId: get_device_api_v1_devices__device_id__get
      security:
