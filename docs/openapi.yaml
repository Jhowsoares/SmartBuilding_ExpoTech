  /api/v1/alerts:
    get:
      tags:
        - Alerts
      summary: Listar alertas
      operationId: list_alerts_api_v1_alerts_get
      security:
        - HTTPBearer: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
            title: Page
        - name: size
          in: query
          required: false
          schema:
            type: integer
            maximum: 100
            minimum: 1
            default: 20
            title: Size
        - name: active_only
          in: query
          required: false
          schema:
            type: boolean
            description: Somente alertas não resolvidos
            default: false
            title: Active Only
          description: Somente alertas não resolvidos
        - name: device_id
          in: query
          required: false
          schema:
            anyOf:
              - type: string
                format: uuid
              - type: 'null'
            title: Device Id
        - name: severity
          in: query
          required: false
          schema:
            anyOf:
              - $ref: '#/components/schemas/AlertSeverity'
              - type: 'null'
            title: Severity
