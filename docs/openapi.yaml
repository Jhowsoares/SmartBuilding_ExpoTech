                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
        - Devices
      summary: Atualizar dispositivo
      operationId: update_device_api_v1_devices__device_id__patch
      security:
        - HTTPBearer: []
      parameters:
        - name: device_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
            title: Device Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
        - Devices
      summary: Desativar dispositivo
      operationId: delete_device_api_v1_devices__device_id__delete
      security:
        - HTTPBearer: []
      parameters:
        - name: device_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
            title: Device Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  '/api/v1/devices/{device_id}/control':
    post:
      tags:
        - Devices
      summary: Controlar dispositivo (ligar/desligar/setpoint)
      operationId: control_device_api_v1_devices__device_id__control_post
      security:
