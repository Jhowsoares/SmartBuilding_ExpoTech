components:
  schemas:
    AlertCreate:
      properties:
        device_id:
          type: string
          format: uuid
          title: Device Id
        alert_type:
          $ref: '#/components/schemas/AlertType'
        severity:
          $ref: '#/components/schemas/AlertSeverity'
        message:
          anyOf:
            - type: string
            - type: 'null'
          title: Message
      type: object
      required:
        - device_id
        - alert_type
        - severity
      title: AlertCreate
    AlertResponse:
      properties:
        id:
          type: string
          format: uuid
          title: Id
        device_id:
          type: string
          format: uuid
          title: Device Id
        alert_type:
          $ref: '#/components/schemas/AlertType'
        severity:
          $ref: '#/components/schemas/AlertSeverity'
        message:
          anyOf:
            - type: string
            - type: 'null'
          title: Message
        created_at:
          type: string
          format: date-time
          title: Created At
        acknowledged_at:
          anyOf:
            - type: string
              format: date-time
            - type: 'null'
          title: Acknowledged At
        resolved_at:
          anyOf:
            - type: string
              format: date-time
            - type: 'null'
          title: Resolved At
        is_active:
          type: boolean
          title: Is Active
          default: true
        links:
          items:
            $ref: '#/components/schemas/HateoasLink'
