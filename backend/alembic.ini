# =============================================================
# Alembic — configuração de migrations do Smart Building
# =============================================================
# Uso (dentro do container):
#   alembic upgrade head          # aplica todas as migrations
#   alembic revision --autogenerate -m "descricao"
#   alembic downgrade -1          # reverte a última migration
# =============================================================

[alembic]
script_location = alembic
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s
prepend_sys_path = .

# URL sobrescrita pelo env.py via SYNC_DATABASE_URL do ambiente Docker
sqlalchemy.url = postgresql+psycopg2://jhonata:expo_PSW_1@postgres:5432/expotech_db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
